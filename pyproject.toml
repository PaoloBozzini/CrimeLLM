[project]
name = "crimellm"
version = "0.1.0"
description = "Fine-tune an encoder (InLegalBERT) into a 3-class crime classifier."
requires-python = ">=3.10,<3.13"
readme = "README.md"
dependencies = [
    "transformers>=4.46",
    "datasets>=3.0",
    "evaluate>=0.4.3",
    "scikit-learn>=1.5",
    "accelerate>=1.0",
    "pandas>=2.2",
    "numpy>=1.26",
    "torch>=2.4",
    "ipykernel>=6.29",
    "ipywidgets>=8.1",
    "matplotlib>=3.9",
    "sentencepiece>=0.2",
    "protobuf>=5.0",
    "sentence-transformers>=3.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/crimellm"]

# --- Cross-platform PyTorch --------------------------------------------------
# Mac (Apple Silicon) and Linux/CPU: default PyPI wheel (MPS supported on macOS).
# Windows + NVIDIA: pull from PyTorch CUDA 12.1 index.
[[tool.uv.index]]
name = "pytorch-cu121"
url = "https://download.pytorch.org/whl/cu121"
explicit = true

[tool.uv.sources]
torch = [
    { index = "pytorch-cu121", marker = "sys_platform == 'win32'" },
]
