services:
  neo4j-test:
    image: neo4j:5.26-community
    container_name: crimellm-neo4j-test
    restart: "no"
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      NEO4J_AUTH: ${CRIMELLM_TEST_NEO4J_USER:-neo4j}/${CRIMELLM_TEST_NEO4J_PASSWORD:-crimellm-test}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_heap_initial__size: 512M
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_dbms_memory_pagecache_size: 512M
    volumes:
      - neo4j_test_data:/data
      - neo4j_test_logs:/logs
      - neo4j_test_plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --tries=1 http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  neo4j_test_data:
  neo4j_test_logs:
  neo4j_test_plugins:
