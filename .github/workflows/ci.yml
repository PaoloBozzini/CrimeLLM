name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies (clg + dev only)
        # Skip the heavy [classifier] extra (transformers/torch/faiss). The
        # tests we run on CI cover env + clg + classifier.config — none need
        # the ML stack to import.
        run: uv sync --extra clg --extra dev

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Pytest
        # Neo4j-dependent tests auto-skip when the DB is unreachable, so CI
        # runs the non-DB suite. To add live Neo4j, spin up a service
        # container and set NEO4J_URI/NEO4J_PASSWORD env vars on this step.
        env:
          NEO4J_URI: bolt://localhost:7687
        run: uv run pytest
